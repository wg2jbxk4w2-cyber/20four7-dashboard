<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>20FOUR7 Renner/Penner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; color: #f0f0f0; padding: 1.5rem; min-height: 100vh; }
  .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .summary-card { background: #1c1c1c; border-radius: 10px; padding: 1rem 1.25rem; border: 0.5px solid #2a2a2a; }
  .summary-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .summary-value { font-size: 24px; font-weight: 600; color: #fff; }
  .summary-sub { font-size: 11px; color: #555; margin-top: 2px; }
  .section-label { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
  .zeitraum { font-size: 12px; color: #555; margin-bottom: 1.5rem; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .panel { background: #1c1c1c; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 1rem 1.25rem; }
  .panel-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .panel-title.green { color: #63991f; }
  .panel-title.red { color: #e24b4a; }
  .artikel-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 0.5px solid #222; gap: 10px; }
  .artikel-row:last-child { border-bottom: none; }
  .rank { font-size: 11px; color: #555; width: 18px; flex-shrink: 0; }
  .artikel-name { font-size: 13px; color: #ddd; flex: 1; }
  .bar-wrap { width: 60px; height: 4px; background: #2a2a2a; border-radius: 2px; flex-shrink: 0; }
  .bar { height: 4px; border-radius: 2px; }
  .bar-green { background: #63991f; }
  .bar-red { background: #e24b4a; }
  .artikel-anzahl { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; }
  .artikel-eur { font-size: 11px; color: #555; white-space: nowrap; margin-left: 6px; }
  .updated { font-size: 12px; color: #444; margin-top: 1rem; text-align: right; }
  .loading { text-align: center; color: #555; padding: 3rem; font-size: 14px; }
  .error { text-align: center; color: #e24b4a; padding: 3rem; font-size: 14px; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } .summary-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="summary-grid" id="summary-grid">
  <div class="loading" style="grid-column:1/-1">Daten werden geladen...</div>
</div>

<div class="zeitraum" id="zeitraum"></div>
<div class="section-label">Top 15 Renner &amp; Penner</div>
<div class="two-col" id="two-col">
  <div class="loading">Wird geladen...</div>
</div>

<p class="updated" id="updated-at"></p>

<script>
const SHEET_ID = '1BNq84-3ocljRb9Z--g6DOa7uph-e-AzxfkE0ZLU7P4Y';

async function fetchData() {
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv&sheet=Renner_Penner';
  const res = await fetch(url);
  const text = await res.text();
  const parsed = Papa.parse(text, { header: true, skipEmptyLines: true });
  return parsed.data;
}

function getAnzahl(row) {
  // Suche Spalte mit Stück-Anzahl — egal wie sie heißt
  for (const key of Object.keys(row)) {
    if (key.toLowerCase().includes('verkauft') || key.toLowerCase().includes('anzahl') || key.toLowerCase().includes('st')) {
      const val = parseInt(row[key]);
      if (!isNaN(val) && val > 0) return val;
    }
  }
  return 0;
}

function getEur(row) {
  for (const key of Object.keys(row)) {
    if (key.toLowerCase().includes('umsatz') || key.toLowerCase().includes('eur')) {
      const val = parseFloat((row[key] || '0').replace(',', '.'));
      if (!isNaN(val)) return val;
    }
  }
  return 0;
}

function getZeitraum(row) {
  for (const key of Object.keys(row)) {
    if (key.toLowerCase().includes('zeitraum')) return row[key] || '';
  }
  return '';
}

function formatEur(val) {
  return parseFloat(val || 0).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + '€';
}

function renderSummary(rows) {
  const totalStueck = rows.reduce((s, r) => s + getAnzahl(r), 0);
  const totalEur = rows.reduce((s, r) => s + getEur(r), 0);
  const zeitraum = rows[0] ? getZeitraum(rows[0]) : '';
  document.getElementById('zeitraum').textContent = zeitraum ? 'Zeitraum: ' + zeitraum : '';
  document.getElementById('summary-grid').innerHTML = `
    <div class="summary-card"><div class="summary-label">Artikel gesamt</div><div class="summary-value">${rows.length}</div><div class="summary-sub">verschiedene Produkte</div></div>
    <div class="summary-card"><div class="summary-label">Verkauft gesamt</div><div class="summary-value">${totalStueck.toLocaleString('de-DE')}</div><div class="summary-sub">Stück</div></div>
    <div class="summary-card"><div class="summary-label">Umsatz gesamt</div><div class="summary-value">${formatEur(totalEur)}</div><div class="summary-sub">Brutto EUR</div></div>
  `;
}

function renderLists(rows) {
  const sorted = [...rows].sort((a, b) => getAnzahl(b) - getAnzahl(a));
  const renner = sorted.slice(0, 15);
  const penner = sorted.slice(-15).reverse();
  const maxR = getAnzahl(renner[0]) || 1;
  const maxP = getAnzahl(penner[0]) || 1;

  function renderRow(r, i, max, colorClass) {
    const anzahl = getAnzahl(r);
    const eur = getEur(r);
    const name = (r['Artikel'] || '').trim();
    const pct = Math.round((anzahl / max) * 100);
    return `<div class="artikel-row">
      <span class="rank">${i+1}.</span>
      <span class="artikel-name">${name}</span>
      <div class="bar-wrap"><div class="bar bar-${colorClass}" style="width:${pct}%"></div></div>
      <span class="artikel-anzahl">${anzahl}x</span>
      <span class="artikel-eur">${formatEur(eur)}</span>
    </div>`;
  }

  document.getElementById('two-col').innerHTML = `
    <div class="panel"><div class="panel-title green">🏆 Top Renner</div>${renner.map((r,i) => renderRow(r,i,maxR,'green')).join('')}</div>
    <div class="panel"><div class="panel-title red">📉 Top Penner</div>${penner.map((r,i) => renderRow(r,i,maxP,'red')).join('')}</div>
  `;
}

async function init() {
  const now = new Date();
  document.getElementById('updated-at').textContent = 'Zuletzt geladen: ' + now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';
  try {
    const rows = await fetchData();
    if (!rows || rows.length === 0) throw new Error('Keine Daten');
    renderSummary(rows);
    renderLists(rows);
  } catch(e) {
    document.getElementById('summary-grid').innerHTML = '<div class="error" style="grid-column:1/-1">Fehler: ' + e.message + '</div>';
    document.getElementById('two-col').innerHTML = '';
  }
}

init();
</script>
</body>
</html>
